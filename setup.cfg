[mypy]
ignore_missing_imports = True

[coverage:run]

[coverage:report]
exclude_lines =
	pragma: no cover
	def __repr__
	if self.debug:
	if settings.DEBUG
	raise AssertionError
	raise NotImplementedError
	if 0:
	if __name__ == .__main__.:
	def main

[tox:tox]
isolated_build = true
envlist = audit, py312, py311, py310, format, lint, build-linux, build-macos

[gh-actions]
python =
	3.10: py310
	3.11: py311, format, lint, build
	3.12: py312

[testenv]
allowlist_externals = pytest
dependency_groups =
	dev
passenv = *
setenv =
	PYTHONPATH = {toxinidir}
	PYTHONWARNINGS = ignore
commands =
	pytest --cov=nzshm_common --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:audit]
allowlist_externals =
	uv
commands =
	uv export --all-groups --output audit.txt
	uv run pip-audit -r audit.txt --require-hashes
	uv run safety scan

[testenv:format]
allowlist_externals =
	ruff
dependency_groups =
	dev
commands =
	ruff check --select I --fix nzshm_common tests
	ruff format nzshm_common tests

[testenv:lint]
allowlist_externals =
	ruff
	mypy
dependency_groups =
	dev
commands =
	ruff check nzshm_common tests
	mypy nzshm_common tests

[testenv:build-linux]
platform = linux
allowlist_externals =
	uv
	mkdocs
	twine
dependency_groups =
	dev
	doc
commands =
	uv build

[testenv:build-macos]
platform = darwin
allowlist_externals =
	uv
	mkdocs
	twine
dependency_groups =
	dev
	doc
commands =
	uv build
